<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ride Radar</title>

<style>

body{
  background:#0f1412;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  margin:0;
  color:#e6efe8;
}

/* header */

header{
  padding:22px;
  font-size:26px;
  font-weight:700;
  letter-spacing:0.5px;
}

/* grid */

#rides{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:18px;
  padding:20px;
}

/* card */

.card{

  background:#1a221d;
  border-radius:14px;
  overflow:hidden;

  box-shadow:
  0 6px 18px rgba(0,0,0,0.45),
  inset 0 1px 0 rgba(255,255,255,0.03);

  transition:transform .15s ease, box-shadow .15s ease;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:
  0 10px 26px rgba(0,0,0,0.55);
}

/* top ride type bar */

.typebar{
  height:6px;
}

/* palette */

.trail .typebar{ background:#4CAF50 }
.enduro .typebar{ background:#8BC34A }
.crosscountry .typebar{ background:#8D6E63 }
.motocross .typebar{ background:#A1887F }
.other .typebar{ background:#607D8B }

/* content */

.content{
  padding:18px;
}

.title{
  font-size:20px;
  font-weight:600;
  margin-bottom:6px;
  line-height:1.2;
}

.district{
  color:#9fb0a4;
  font-size:14px;
  margin-bottom:14px;
}

/* info row */

.meta{
  display:flex;
  gap:16px;
  font-size:14px;
  color:#cfe0d3;
}

/* icons */

.meta span{
  display:flex;
  align-items:center;
  gap:6px;
}

/* footer */

.footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:16px;
}

/* calendar button */

.calendar{

  width:36px;
  height:36px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:8px;

  background:#26352c;

  cursor:pointer;

  font-size:18px;

  transition:background .15s;
}

.calendar:hover{
  background:#32463a;
}

/* subtle divider */

.divider{
  height:1px;
  background:rgba(255,255,255,0.05);
  margin-top:14px;
}

</style>
</head>

<body>

<header>
Ride Radar
</header>

<div id="rides"></div>

<script>

function getCardType(type){

  if(!type) return "other"

  type=type.toLowerCase()

  if(type.includes("trail")) return "trail"
  if(type.includes("enduro")) return "enduro"
  if(type.includes("cross")) return "crosscountry"
  if(type.includes("moto")) return "motocross"

  return "other"
}

function formatDate(dateStr){

  const d=new Date(dateStr)

  return d.toLocaleDateString("en-NZ",{
    day:"numeric",
    month:"short"
  })
}

function createCalendarLink(ride){

  const date=new Date(ride.date)

  const end=new Date(date)
  end.setHours(end.getHours()+6)

  const format=(d)=>d.toISOString().replace(/-|:|\.\d+/g,'')

  const start=format(date)
  const finish=format(end)

  return `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(ride.title)}&dates=${start}/${finish}&location=${encodeURIComponent(ride.district)}`
}

async function loadRides(){

  const res=await fetch("/rides")
  let rides=await res.json()

  rides.sort((a,b)=>new Date(a.date)-new Date(b.date))

  const container=document.getElementById("rides")

  rides.forEach(ride=>{

    const card=document.createElement("div")
    card.className="card "+getCardType(ride.type)

    const typebar=document.createElement("div")
    typebar.className="typebar"

    const content=document.createElement("div")
    content.className="content"

    const title=document.createElement("div")
    title.className="title"
    title.textContent=ride.title

    const district=document.createElement("div")
    district.className="district"
    district.textContent=ride.district

    const meta=document.createElement("div")
    meta.className="meta"

    const date=document.createElement("span")
    date.textContent="📅 "+formatDate(ride.date)

    const drive=document.createElement("span")

    if(ride.distance_km)
      drive.textContent=`🚗 ${ride.distance_km} km • ${ride.drive_time_minutes} min`

    meta.appendChild(date)
    meta.appendChild(drive)

    const divider=document.createElement("div")
    divider.className="divider"

    const footer=document.createElement("div")
    footer.className="footer"

    const spacer=document.createElement("div")

    const calendar=document.createElement("div")
    calendar.className="calendar"
    calendar.textContent="📆"
    calendar.onclick=()=>window.open(createCalendarLink(ride),"_blank")

    footer.appendChild(spacer)
    footer.appendChild(calendar)

    content.appendChild(title)
    content.appendChild(district)
    content.appendChild(meta)
    content.appendChild(divider)
    content.appendChild(footer)

    card.appendChild(typebar)
    card.appendChild(content)

    container.appendChild(card)

  })

}

loadRides()

</script>

</body>
</html>
