<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Ride Radar</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Ride Radar</h1>
</header>

<div id="map"></div>

<div id="rideCard" class="hidden">
<h2 id="rideTitle"></h2>

<div class="rideInfo">
<div id="rideDate"></div>
<div id="rideType"></div>
<div id="rideDistrict"></div>
<div id="rideAddress"></div>
</div>

<div class="buttons">
<button id="calendarBtn">Add to Calendar</button>
<button id="openEventBtn">Open Event Page</button>
<button id="closeCard">Close</button>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
