<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Ride Radar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Ride Radar</h1>
</header>

<div id="tabs">

  <div id="tab-list" class="tab-panel active">
    <div id="rideList"></div>
  </div>

  <div id="tab-map" class="tab-panel">
    <div id="map"></div>
  </div>

  <div id="tab-prefs" class="tab-panel">
    <div id="prefsPanel">
      <h2>Preferences</h2>

      <div class="pref-group">
        <div class="pref-group-title">Origin for drive distance</div>

        <div class="toggle-row">
          <span>Use my current location (GPS)</span>
          <label class="toggle">
            <input type="checkbox" id="useGPS" checked/>
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div id="gpsStatus" class="gps-status">Acquiring location&hellip;</div>

        <div id="manualOrigin" class="manual-origin disabled">
          <p class="manual-label">Or set a fixed address:</p>
          <input type="text" id="prefAddress" placeholder="e.g. 5 Main Street, Wellington"/>
          <button id="geocodeBtn">Set this address</button>
          <p id="prefMsg"></p>
        </div>
      </div>

      <div class="pref-group">
        <div class="pref-group-title">Maximum drive time</div>
        <p class="manual-label">Only show rides within this drive time from your origin. Rides without a calculated time are always shown.</p>
        <div id="driveTimeFilters" class="drive-time-btns">
          <button class="dt-btn active" data-mins="">Any</button>
          <button class="dt-btn" data-mins="60">1 hr</button>
          <button class="dt-btn" data-mins="90">1½ hr</button>
          <button class="dt-btn" data-mins="120">2 hrs</button>
          <button class="dt-btn" data-mins="180">3 hrs</button>
          <button class="dt-btn" data-mins="240">4 hrs</button>
        </div>
      </div>

      <div class="pref-group">
        <div class="pref-group-title">Filter by ride type</div>
        <div id="typeFilters"></div>
      </div>
    </div>
  </div>

</div>

<nav id="tabBar">
  <button class="tab-btn active" data-tab="tab-list">&#9776; Rides List</button>
  <button class="tab-btn" data-tab="tab-map">&#128506; Map</button>
  <button class="tab-btn" data-tab="tab-prefs">&#9881; Preferences</button>
</nav>

<div id="rideCard" class="hidden">
  <h2 id="rideTitle"></h2>
  <div class="rideInfo">
    <div id="rideDate"></div>
    <div id="rideType"></div>
    <div id="rideDistrict"></div>
    <div id="rideAddress"></div>
    <div id="rideDrive"></div>
  </div>
  <div class="buttons">
    <button id="calendarBtn">Add to Calendar</button>
    <button id="openEventBtn">Open Event Page</button>
    <button id="closeCard">Close</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
